version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./rag_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=qdrant-server
      - QDRANT_PORT=6333
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
      - NEO4J_URI=bolt://neo4j-server:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j123456
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - qdrant-server
      - redis-server
      - neo4j-server

  qdrant-server:
    image: qdrant/qdrant:latest
    container_name: qdrant-server
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - app-network

  redis-server:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

  neo4j-server:
    image: neo4j:latest
    container_name: neo4j-server
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4j123456
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge